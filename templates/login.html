{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <span class="hero-badge">
            ✦ Welcome Back
        </span>

        <h1>Log In</h1>

        <p class="section-description">
            Continue writing your story.
        </p>

        <form action="{{ url_for('login') }}" method="POST">

            <label for="username">
                Username
            </label>

            <input
                type="text"
                id="username"
                name="username"
                autocomplete="username"
                required
            >

            <div class="password-label-row">

                <label for="password">
                    Password
                </label>

                <a
                    href="{{ url_for('forgot_password') }}"
                    class="forgot-password-link"
                >
                    Forgot password?
                </a>

            </div>

            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Log In
            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{{ url_for('signup') }}">
                Create one
            </a>

        </div>

    </div>

</div>

{% endblock %}
