{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <span class="hero-badge">
            ✦ Secure Reset
        </span>

        <h1>Set New Password</h1>

        <p class="section-description">
            Choose a strong new password for your Journelle account.
        </p>

        <form method="POST">

            <label for="password">
                New Password
            </label>

            <input
                type="password"
                id="password"
                name="password"
                autocomplete="new-password"
                minlength="8"
                required
            >

            <p class="password-hint">
                Use at least 8 characters with uppercase,
                lowercase, a number, and a special character.
            </p>

            <label for="confirm_password">
                Confirm New Password
            </label>

            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                autocomplete="new-password"
                minlength="8"
                required
            >

            <button type="submit">
                Reset Password
            </button>

        </form>

        <div class="auth-footer">

            <a href="{{ url_for('login') }}">
                Back to Log In
            </a>

        </div>

    </div>

</div>

{% endblock %}
