{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <span class="hero-badge">
            ✦ Account Recovery
        </span>

        <h1>Forgot Password?</h1>

        <p class="section-description">
            Enter the email linked to your Journelle account.
            If an account exists, we'll send you a secure reset link.
        </p>

        <form
            action="{{ url_for('forgot_password') }}"
            method="POST"
        >

            <label for="email">
                Email
            </label>

            <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                placeholder="Enter your email address"
                required
            >

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        <div class="auth-footer">

            Remember your password?

            <a href="{{ url_for('login') }}">
                Back to Log In
            </a>

        </div>

    </div>

</div>

{% endblock %}
