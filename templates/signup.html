{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <span class="hero-badge">
            ✦ Join Journelle
        </span>

        <h1>Create Account</h1>

        <p class="section-description">
            Start building your personal journal with AI reflections.
        </p>

        <form action="{{ url_for('signup') }}" method="POST">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required
            >

            <label>Password</label>

            <input
                type="password"
                name="password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{{ url_for('login') }}">
                Log In
            </a>

        </div>

    </div>

</div>

{% endblock %}
