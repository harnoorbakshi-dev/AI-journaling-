services:
  - type: web
    name: journelle
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --threads 4 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
    autoDeploy: true